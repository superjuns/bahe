<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>数学大拔河</title>
    <style>
        :root {
            --bg: #e9edf2;
            --panel: #fff;
            --blue: #1f8fff;
            --red: #ff4e42;
            --text: #1f2d3d;
            --muted: #6e7d91;
            --shadow: 0 10px 24px rgba(25, 45, 76, .12);
            --radius: 22px;
            --ui-scale: 1;
            --green: #2ecc71;
            --grey: #b0b8c4;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, #f8fbff 0, #eef3f8 28%, var(--bg) 78%);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }
        .viewport {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            overflow: hidden;
        }
        button,
        input,
        textarea,
        select {
            font: inherit;
        }
        button {
            border: 0;
            cursor: pointer;
        }
        .app {
            width: min(1480px, calc((100vw - 40px)/var(--ui-scale)));
            height: min(920px, calc((100dvh - 36px)/var(--ui-scale)));
            padding: 14px;
            display: flex;
            flex-direction: column;
            transform: scale(var(--ui-scale));
            transform-origin: center center;
            transition: transform .16s;
            position: relative;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .pill-btn {
            background: #fff;
            color: var(--text);
            border-radius: 999px;
            padding: 10px 16px;
            box-shadow: 0 6px 16px rgba(22, 42, 74, .12);
            font-weight: 700;
            white-space: nowrap;
        }
        .pill-btn.primary {
            background: linear-gradient(135deg, var(--blue), #4fb8ff);
            color: #fff;
        }
        .pill-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
            background: #cdd4df;
            color: #7b8a9d;
            box-shadow: none;
        }
        .timer-config {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .timer-controls {
            display: flex;
            align-items: center;
            background: #f3f7fb;
            border-radius: 999px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px #d8dee8;
        }
        .timer-controls button {
            width: 32px;
            height: 32px;
            background: transparent;
            color: var(--text);
            font-weight: 900;
            font-size: 18px;
            display: grid;
            place-items: center;
            transition: background .12s;
            user-select: none;
        }
        .timer-controls button:hover {
            background: #e4ebf3;
        }
        .timer-config input {
            width: 54px;
            border: 0;
            outline: none;
            text-align: center;
            font-weight: 800;
            background: transparent;
            padding: 6px 0;
            -moz-appearance: textfield;
        }
        .timer-config input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
        .difficulty-select {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f3f7fb;
            border-radius: 999px;
            padding: 4px 12px 4px 16px;
            box-shadow: inset 0 0 0 1px #d8dee8;
        }
        .difficulty-select label {
            font-weight: 700;
            color: var(--muted);
            font-size: 14px;
        }
        .difficulty-select select {
            border: 0;
            background: transparent;
            font-weight: 800;
            padding: 6px 4px;
            outline: none;
            font-size: 15px;
        }
        .layout {
            display: grid;
            grid-template-columns: 360px minmax(360px, 1fr) 360px;
            gap: 20px;
            align-items: start;
            flex: 1;
            min-height: 0;
        }
        .card {
            background: var(--panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .team-card {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
        }
        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            color: #fff;
            font-weight: 800;
            font-size: 22px;
            gap: 8px;
        }
        .team-header.blue {
            background: linear-gradient(135deg, #148cff, #3eb1ff);
        }
        .team-header.red {
            background: linear-gradient(135deg, #f74438, #ff6d61);
        }
        .team-header .left-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .team-header .right-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .team-header .team-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 20px;
        }
        .score-dot {
            min-width: 40px;
            height: 40px;
            padding: 0 8px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, .92);
            color: var(--text);
            font-weight: 900;
            font-size: 22px;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .5);
        }
        .ready-btn {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 800;
            transition: all .2s;
            white-space: nowrap;
            border: 2px solid transparent;
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ready-btn.ready {
            background: var(--green);
            color: #fff;
            border-color: #27ae60;
        }
        .ready-btn.not-ready {
            background: var(--grey);
            color: #4a5568;
            border-color: #9aa5b3;
        }
        .ready-btn.ai-mode {
            background: #8e44ad;
            color: #fff;
            border-color: #6c3483;
            cursor: default;
            opacity: .9;
        }
        .ready-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
        }
        .ready-btn:not(:disabled):hover {
            transform: scale(1.04);
        }
        .team-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .question-text {
            min-height: 104px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            line-height: 1.25;
            padding: 14px 10px;
            border-radius: 18px;
            background: linear-gradient(180deg, #f7fbff, #eef6ff);
            color: #1680eb;
            word-break: break-word;
        }
        .team-card.right .question-text {
            color: #f44336;
            background: linear-gradient(180deg, #fff6f6, #fff0ef);
        }
        .question-meta {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: #eef3fb;
            color: var(--muted);
            border-radius: 999px;
            padding: 6px 12px;
            font-weight: 700;
            font-size: 14px;
        }
        .answer-screen {
            min-height: 66px;
            border-radius: 16px;
            border: 2px solid #e7edf4;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            font-size: 34px;
            font-weight: 900;
            color: #5b6877;
            letter-spacing: 2px;
            font-family: "Bahnschrift", "Arial Black", sans-serif;
        }
        .feedback {
            min-height: 30px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
        }
        .feedback.ok {
            color: #12a150;
        }
        .feedback.bad {
            color: #f05a4f;
        }
        .feedback.ai-thinking {
            color: #8e44ad;
            font-style: italic;
        }
        .numeric-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .pad-btn,
        .choice-btn {
            min-height: 70px;
            border-radius: 14px;
            background: #f7f7f8;
            color: #111;
            font-size: 26px;
            font-weight: 900;
            box-shadow: inset 0 0 0 2px #ededee;
            transition: transform .12s, box-shadow .12s, background .12s;
        }
        .pad-btn:hover,
        .choice-btn:hover {
            transform: translateY(-1px);
            box-shadow: inset 0 0 0 2px #dce3ec, 0 8px 18px rgba(22, 42, 74, .08);
        }
        .pad-btn.action-clear {
            background: linear-gradient(135deg, #f66a4f, #e13a31);
            color: #fff;
            box-shadow: none;
        }
        .pad-btn.action-ok {
            background: linear-gradient(135deg, #14a1ec, #0c7acc);
            color: #fff;
            box-shadow: none;
        }
        .pad-btn:disabled,
        .choice-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none !important;
        }
        .choices {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .choice-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            min-height: 60px;
            font-size: 20px;
            padding: 8px 12px;
            text-align: left;
        }
        .choice-btn.selected {
            background: linear-gradient(135deg, #dff1ff, #c9e7ff);
            box-shadow: inset 0 0 0 2px #72bfff;
        }
        .choice-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .choice-actions button {
            min-height: 52px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
        }
        .secondary {
            background: #eef3f8;
            color: var(--text);
        }
        .confirm {
            background: linear-gradient(135deg, #14a1ec, #0c7acc);
            color: #fff;
        }
        .arena {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            height: 100%;
        }
        .arena-top {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            padding: 18px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #fcfcfd, #eff2f7);
            box-shadow: inset 0 0 0 2px rgba(217, 224, 232, .8);
        }
        .arena-stat {
            text-align: center;
        }
        .arena-stat .label {
            color: var(--muted);
            font-size: 16px;
            font-weight: 700;
        }
        .arena-stat .value {
            font-size: 40px;
            font-weight: 900;
            margin-top: 2px;
            color: #167ddc;
            font-family: "Bahnschrift", "Arial Black", sans-serif;
        }
        .arena-stat.right .value {
            color: #ef483c;
        }
        .timer {
            text-align: center;
            color: #0f86dc;
            font-weight: 900;
            font-size: 34px;
            font-family: "Bahnschrift", "Arial Black", sans-serif;
        }
        .arena-stage {
            position: relative;
            flex: 1;
            min-height: 360px;
            border-radius: 24px;
            overflow: hidden;
            background: linear-gradient(180deg, #fff 0, #f7f8fa 45%, #f1f3f6 100%);
            box-shadow: inset 0 0 0 2px rgba(223, 228, 235, .9);
        }
        .center-line {
            position: absolute;
            left: 50%;
            top: 24px;
            bottom: 24px;
            width: 0;
            border-left: 3px dashed rgba(74, 88, 107, .45);
            transform: translateX(-50%);
        }
        .ground {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 120px;
            height: 5px;
            background: rgba(55, 77, 103, .2);
        }
        .rope-wrap {
            position: absolute;
            left: 50%;
            top: 54%;
            width: 76%;
            height: 10px;
            transform: translate(-50%, -50%);
        }
        .rope {
            position: absolute;
            left: 20px;
            right: 20px;
            top: 50%;
            height: 8px;
            background: linear-gradient(90deg, #3c2b1e, #6c4d35, #3c2b1e);
            transform: translateY(-50%);
        }
        .rope::before,
        .rope::after {
            content: "";
            position: absolute;
            top: 0;
            width: 40px;
            height: 25px;
            border-bottom: 8px solid transparent;
        }
        .rope::before {
            left: -40px;
            border-left: 8px solid #3c2b1e;
            border-top: 8px solid #3c2b1e;
            border-radius: 40px 0 0 0;
        }
        .rope::after {
            right: -40px;
            border-right: 8px solid #3c2b1e;
            border-top: 8px solid #3c2b1e;
            border-radius: 0 40px 0 0;
        }
        .rope-marker {
            position: absolute;
            top: 50%;
            left: calc(50% + var(--rope-shift, 0px));
            width: 20px;
            height: 58px;
            transform: translate(-50%, -50%);
            transition: left .35s;
        }
        .rope-marker::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 8px;
            transform: translateX(-50%);
            width: 3px;
            height: 40px;
            background: #db3c30;
        }
        .rope-marker::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-20%);
            border-left: 11px solid #db3c30;
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
        }
        .team-group {
            position: absolute;
            top: 52%;
            display: flex;
            gap: 34px;
            transform: translateY(-50%);
            transition: transform .35s;
        }
        .team-group.left {
            left: calc(50% - 280px + var(--group-shift, 0px));
        }
        .team-group.right {
            right: calc(50% - 280px - var(--group-shift, 0px));
        }
        .player {
            width: 100px;
            height: 150px;
            position: relative;
            z-index: 5;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .player.red {

        }
        .player.left-lean {
            transform: rotate(10deg);
        }
        .player.right-lean {
            transform: rotate(-10deg);
        }
        @keyframes pulling-left {
            0%,
            100% {
                transform: rotate(10deg) translate(0, 0);
            }
            25% {
                transform: rotate(12deg) translate(-2px, 2px);
            }
            75% {
                transform: rotate(8deg) translate(2px, -1px);
            }
        }
        @keyframes pulling-right {
            0%,
            100% {
                transform: rotate(-10deg) translate(0, 0);
            }
            25% {
                transform: rotate(-12deg) translate(2px, 2px);
            }
            75% {
                transform: rotate(-8deg) translate(-2px, -1px);
            }
        }
        .is-playing .player.left-lean {
            animation: pulling-left .8s infinite ease-in-out;
        }
        .is-playing .player.right-lean {
            animation: pulling-right .8s infinite ease-in-out;
            animation-delay: .1s;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            padding: 6px 6px 2px;
        }
        .status-pill {
            border-radius: 999px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, .92);
            box-shadow: 0 6px 16px rgba(22, 42, 74, .08);
            font-weight: 700;
            color: var(--text);
        }
        .winner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .8);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }
        .winner-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .winner-icon {
            font-size: 120px;
            margin-bottom: 20px;
            z-index: 101;
            animation: bounce 2s infinite;
            text-shadow: 0 10px 30px rgba(255, 215, 0, .6);
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        .winner-text {
            font-size: 64px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, .5);
            margin-bottom: 30px;
            text-align: center;
            z-index: 101;
            white-space: pre-wrap;
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            opacity: 0;
        }
        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        .floating-controls {
            position: fixed;
            left: 18px;
            bottom: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .92);
            box-shadow: 0 10px 24px rgba(25, 45, 76, .16);
            backdrop-filter: blur(10px);
            z-index: 18;
        }
        .control-btn {
            min-width: 34px;
            height: 34px;
            padding: 0 10px;
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            font-size: 18px;
            font-weight: 900;
            box-shadow: inset 0 0 0 2px #e8eef5;
        }
        .control-btn.label {
            min-width: 62px;
            font-size: 13px;
            font-weight: 800;
            color: #3f536d;
        }
        .settings-modal {
            position: fixed;

            const cls = getUrlParam('class') || getUrlParam('cls') || getUrlParam('班级');

            if (!cls || !name) return false;

        // ======= 音效 =======
        function playSound(t) {
            if (!soundEnabled) return;
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)(),
                    g = ctx.createGain();
                g.connect(ctx.destination);
                g.gain.value = .3;
                const o = ctx.createOscillator();
                o.connect(g);
                if (t === 'end') { playCheer(); return }
                if (t === 'start') { o.frequency.setValueAtTime(523, ctx.currentTime);
                    o.frequency.setValueAtTime(659, ctx.currentTime + .15);
                    o.frequency.setValueAtTime(784, ctx.currentTime + .3);
                    o.start(ctx.currentTime);
                    o.stop(ctx.currentTime + .45) } else if (t === 'correct') { o.frequency.setValueAtTime(880, ctx
                        .currentTime);
                    o.frequency.setValueAtTime(1100, ctx.currentTime + .1);
                    o.start(ctx.currentTime);
                    o.stop(ctx.currentTime + .15);
                    g.gain.setValueAtTime(.3, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + .15) } else if (t === 'wrong') { o
                        .frequency.setValueAtTime(400, ctx.currentTime);
                    o.frequency.setValueAtTime(250, ctx.currentTime + .2);
                    o.start(ctx.currentTime);
                    o.stop(ctx.currentTime + .25);
                    g.gain.setValueAtTime(.25, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + .25) } else { o.disconnect(); return }
                setTimeout(() => { try { o.disconnect();
                        g.disconnect();
                        ctx.close() } catch (e) {} }, 1e3)
            } catch (e) {}
        }

        function playCheer() {
            if (!soundEnabled) return;
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)(),
                    now = ctx.currentTime,
                    dur = 2,
                    mg = ctx.createGain();
                mg.connect(ctx.destination);
                mg.gain.setValueAtTime(0, now);
                mg.gain.linearRampToValueAtTime(.25, now + .1);
                mg.gain.linearRampToValueAtTime(.2, now + 1.5);
                mg.gain.linearRampToValueAtTime(0, now + dur);
                const bs = ctx.sampleRate * dur,
                    buf = ctx.createBuffer(1, bs, ctx.sampleRate),
                    d = buf.getChannelData(0);
                for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * .6;
                const n = ctx.createBufferSource();
                n.buffer = buf;
                const ng = ctx.createGain();
                ng.gain.setValueAtTime(.3, now);
                ng.gain.linearRampToValueAtTime(.1, now + dur);
                n.connect(ng);
                ng.connect(mg);
                n.start(now);
                n.stop(now + dur);
                for (let i = 0; i < 8; i++) {
                    const o = ctx.createOscillator(),
                        g = ctx.createGain();
                    o.connect(g);
                    g.connect(mg);
                    const f = 300 + Math.random() * 1700;
                    o.frequency.setValueAtTime(f, now);
                    const st = now + Math.random() * .5,
                        d2 = .1 + Math.random() * .3;
                    g.gain.setValueAtTime(0, now);
                    g.gain.setValueAtTime(.04 + Math.random() * .08, st);
                    g.gain.exponentialRampToValueAtTime(.001, st + d2);
                    o.start(st);
                    o.stop(st + d2 + .1);
                    if (Math.random() > .5) o.frequency.setValueAtTime(f * (1 + (Math.random() - .5) * .2), st + d2 * .5);
                    o.type = ['sawtooth', 'square', 'triangle'][Math.floor(Math.random() * 3)]
                }
                const lfo = ctx.createOscillator(),
                    lg = ctx.createGain();
                lfo.connect(lg);
                lg.connect(mg.gain);
                lfo.frequency.setValueAtTime(5 + Math.random() * 3, now);
                lg.gain.setValueAtTime(.05, now);
                lfo.start(now);
                lfo.stop(now + dur);
                setTimeout(() => { try { ctx.close() } catch (e) {} }, (dur + .5) * 1e3)
            } catch (e) {}
        }

        function toggleSound() { soundEnabled = !soundEnabled;
            el.soundBtn.textContent = soundEnabled ? '🔊' : '🔇' }

        // ======= 题库生成 =======
        function createSeededRandom(s) { return function() { s = (s * 9301 + 49297) % 233280; return s / 233280 } }

        function generateMathQuestions(c = 100, seed = null) {
            let r = Math.random;
            if (seed !== null) r = createSeededRandom(seed);
            const rand = (min, max) => Math.floor(r() * (max - min + 1)) + min,
                qs = [],
                types = ['add_no_carry', 'sub_no_borrow', 'add_carry', 'sub_borrow'],
                per = Math.floor(c / types.length);
            let rem = c - per * types.length;
            for (let t of types) {
                let n = per + (rem > 0 ? 1 : 0);
                if (rem > 0) rem--;
                for (let i = 0; i < n; i++) { const q = genOne(t, rand); if (q) qs.push(q) }
            }
            for (let i = qs.length - 1; i > 0; i--) { const j = Math.floor(r() * (i + 1));
                [qs[i], qs[j]] = [qs[j], qs[i]] }
            return qs
        }

        function genOne(type, rand) {
            let a, b, ans, q, opts = [],
                tries = 0;
            while (tries++ < 50) {
                switch (type) {
                    case 'add_no_carry': {
                        const t1 = rand(0, 9),
                            t2 = rand(0, 9 - t1),
                            u1 = rand(0, 9),
                            u2 = rand(0, 9 - u1);
                        a = t1 * 10 + u1;
                        b = t2 * 10 + u2;
                        if (!a || !b) continue;
                        ans = a + b;
                        q = a + ' + ' + b + ' = ?';
                        break
                    }
                    case 'sub_no_borrow': {
                        const t1 = rand(1, 9),
                            t2 = rand(0, t1),
                            u1 = rand(0, 9),
                            u2 = rand(0, u1);
                        a = t1 * 10 + u1;
                        b = t2 * 10 + u2;
                        if (!a || !b || a <= b) continue;
                        ans = a - b;
                        q = a + ' - ' + b + ' = ?';
                        break
                    }
                    case 'add_carry': {
                        a = rand(2, 9);
                        b = rand(2, 9);
                        const s = a + b;
                        if (s <= 10 || s > 20) continue;
                        ans = s;
                        q = a + ' + ' + b + ' = ?';
                        break
                    }
                    case 'sub_borrow': {
                        a = rand(11, 20);
                        b = rand(2, 9);
                        if (a <= b) continue;
                        if (a % 10 >= b % 10) continue;
                        ans = a - b;
                        q = a + ' - ' + b + ' = ?';
                        break
                    }
                }
                if (ans < 0 || ans > 100) continue;
                break
            }
            if (tries >= 50) return null;
            if (Math.random() < .4) {
                opts = genDistractors(ans, type, rand);
                if (!opts.includes(String(ans))) opts[0] = String(ans);
                for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));
                    [opts[i], opts[j]] = [opts[j], opts[i]] }
                return { id: crypto.randomUUID(), type: 'choice', question: q, answer: String(ans), options: opts }
            }
            return { id: crypto.randomUUID(), type: 'number', question: q, answer: String(ans), options: [] }
        }

        function genDistractors(correct, type, rand) {
            const s = new Set([String(correct)]),
                cand = [],
                offs = [-1, 1, -2, 2, -5, 5, -10, 10, -3, 3];
            for (let o of offs) { const v = correct + o; if (v >= 0 && v <= 100 && !s.has(String(v))) cand.push(String(v)) }
            let idx = 0;
            while (cand.length < 3 && idx < 50) { const v = rand(0, 100); if (!s.has(String(v))) cand.push(String(v));
                idx++ }
            const res = [String(correct)];
            for (let i = 0; i < Math.min(3, cand.length); i++) res.push(cand[i]);
            while (res.length < 4) { const v = rand(0, 100); if (!res.includes(String(v))) res.push(String(v)) }
            return res
        }

        function getToday() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') +
                '-' + String(d.getDate()).padStart(2, '0') }

        async function fetchWhitelist() {
            try { const r = await fetch(API_WHITELIST); if (!r.ok) throw Error(); const d = await r.json(); if (d && d
                    .submissions) { whitelistCache = d.submissions; return whitelistCache } return [] } catch (e) { return[] }
        }

        function checkWhitelist(cls, name) {
            if (!whitelistCache) return !1;
            const n = name.trim();
            return whitelistCache.some(i => String(i.class || '').trim() === cls && String(i.name || '').trim() === n)
        }

        }

            let saved = null,
                today = getToday(),
                need = !0;
            try {
                saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (saved && typeof saved === 'object' && saved.generatedDate === today && Array.isArray(saved.bank) &&
                    saved.bank.length) { state.bank = saved.bank;
                    state.teamNameA = saved.teamNameA || '蓝队';
                    state.teamNameB = saved.teamNameB || '红队';
                    need = !1 }
            } catch (e) {}
            if (need) {
                const seed = new Date(today).getTime();
                state.bank = generateMathQuestions(100, seed);
                state.teamNameA = '蓝队';
                state.teamNameB = '红队';
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ bank: state.bank, teamNameA: state.teamNameA,
                        teamNameB: state.teamNameB, generatedDate: today }))
            }
            el.inputNameA.value = state.teamNameA;

        }

                seed = new Date(today).getTime();
            state.bank = generateMathQuestions(100, seed);
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ bank: state.bank, teamNameA: state.teamNameA, teamNameB: state
                        .teamNameB, generatedDate: today }));
            renderBank();
            resetGame();
            alert('✅ 已重新生成今日题库（100道）！')
        }

        function exportBank() {
            if (!state.bank.length) return alert('题库为空');
            let c = '';
            for (const i of state.bank) {
                if (i.type === 'choice') { const w = i.options.filter(o => o !== i.answer);
                    c += i.question + ' / ' + i.answer + ' / ' + w.join(' / ') + '\n' } else c += i.question + ' / ' + i
                        .answer + '\n'
            }
            const b = new Blob([c], { type: 'text/plain;charset=utf-8' }),
                u = URL.createObjectURL(b),
                a = document.createElement('a');
            a.href = u;
            a.download = '数学大拔河题库.txt';
            a.click();
            URL.revokeObjectURL(u)
        }

        function importBank() {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = '.txt';
            inp.onchange = function(e) {
                const f = e.target.files[0];
                if (!f) return;
                const r = new FileReader();
                r.onload = function(ev) { el.batch.value = ev.target.result;
                    alert('✅ 文件已导入到批量录入框，请检查后点击“批量保存到题库”') };
                r.readAsText(f, 'UTF-8')
            };
            inp.click()
        }

        // ======= 准备 & 模式 =======
        function updateReadyUI() {
            el.readyA.className = 'ready-btn ' + (state.readyA ? 'ready' : 'not-ready');
            el.readyA.textContent = state.readyA ? '✅ 已准备' : '⏳ 未准备';
            if (state.isAI) { el.readyB.className = 'ready-btn ai-mode';
                el.readyB.textContent = '🤖 AI对手';
                el.readyB.disabled = !0 } else { el.readyB.className = 'ready-btn ' + (state.readyB ? 'ready' : 'not-ready');
                el.readyB.textContent = state.readyB ? '✅ 已准备' : '⏳ 未准备';
                el.readyB.disabled = !1 }
            updateModeStatus()
        }

        function toggleReady(team) {
            if (state.mode !== 'idle') return alert('比赛进行中，无法更改准备状态');
            if (team === 'A') { state.readyA = !state.readyA; if (!state.readyA && state.isAI) { state.isAI = !1;
                    state.readyB = !1 } } else if (team === 'B') { if (state.isAI) return;
                state.readyB = !state.readyB }
            updateReadyUI()
        }

        function updateModeStatus() {
            let txt = '';
            if (state.mode === 'idle') {
                if (state.isAI) txt = '🤖 单人模式 (孩子 vs AI)';
                else if (state.readyA && state.readyB) txt = '👨‍👦 双人模式 (家长 vs 孩子)';
                else if (!state.readyA && state.readyB) txt = '⏳ 等待家长准备… (可单人)';
                else if (state.readyA && !state.readyB) txt = '⏳ 等待孩子准备…';
                else txt = '⏳ 请双方准备'
            } else if (state.mode === 'dual') txt = '👨‍👦 双人拔河 (家长 vs 孩子)';
            else if (state.mode === 'single') txt = '🤖 单人拔河 (孩子 vs AI)';
            el.modeStatus.textContent = '模式: ' + txt;
            if (state.mode === 'single') { el.badgeA.textContent = '👨 家长';
                el.badgeB.textContent = '🤖 AI' } else if (state.mode === 'dual') { el.badgeA.textContent = '👨 家长';
                el.badgeB.textContent = '👶 孩子' } else { el.badgeA.textContent = '👨 家长';
                el.badgeB.textContent = '👶 孩子' }
        }

        function getDiffConfig() {
            const d = state.difficulty;
            if (d === 'easy') return { delayMin: 3000, delayMax: 5000, accuracy: .6 };
            if (d === 'medium') return { delayMin: 1800, delayMax: 3200, accuracy: .8 };
            if (d === 'hard') return { delayMin: 700, delayMax: 1800, accuracy: .95 };
            return { delayMin: 2000, delayMax: 3500, accuracy: .75 }
        }

        // ======= 游戏逻辑 =======
        function updateTop() {
            el.sA.textContent = state.scoreA;
            el.sB.textContent = state.scoreB;
            el.asA.textContent = state.scoreA;
            el.asB.textContent = state.scoreB;
            el.bankInfo.textContent = '题库数量: ' + state.bank.length;
            el.timer.textContent = fmt(state.timerSec)
        }

        function getTeamState(t) { return t === 'A' ? state.teamA : state.teamB }

        function getTeamQuestion(t) { return t === 'A' ? state.qA : state.qB }

        function setTeamQuestion(t, q) { t === 'A' ? state.qA = q : state.qB = q }

        function renderProgress() {
            const s = state.pull * -10;
            document.documentElement.style.setProperty('--rope-shift', s + 'px');
            document.documentElement.style.setProperty('--group-shift', s + 'px');
            let txt = '居中',
                col = '';
            if (state.pull > 0) { txt = '偏向 ' + state.teamNameA + ' ' + state.pull + ' 格';
                col = '#148cff' } else if (state.pull < 0) { txt = '偏向 ' + state.teamNameB + ' ' + Math.abs(state.pull) +
                    ' 格';
                col = '#f74438' }
            el.progress.textContent = '拔河进度: ' + txt;
            el.progress.style.color = col || ''
        }

        function setFeedback(team, msg, type = '') {
            const t = team === 'A' ? el.fA : el.fB;
            t.textContent = msg;
            t.className = 'feedback' + (type ? ' ' + type : '')
        }

        function updateDisplay(team) {
            const t = getTeamState(team),
                disp = team === 'A' ? el.dA : el.dB,
                q = getTeamQuestion(team);
            if (!q) { disp.textContent = '0'; return }
            disp.textContent = q.type === 'number' ? (t.answer || '0') : (t.selected || '请选择')
        }

        function updateMeta(team, q) {
            const txt = q ? (q.type === 'number' ? '数字题' : '选择题') : '未开始';
            if (team === 'A') el.metaA.textContent = '题型: ' + txt;
            else el.metaB.textContent = '题型: ' + txt
        }

        function createPad(team) {
            const w = document.createElement('div');
            w.className = 'numeric-pad';
            ['1', '2', '3', '4', '5', '6', '7', '8', '9', '清空', '0', '确定'].forEach(k => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'pad-btn';
                b.textContent = k === '确定' ? '✓' : k === '清空' ? '×' : k;
                if (k === '清空') b.classList.add('action-clear');
                if (k === '确定') b.classList.add('action-ok');
                b.addEventListener('click', () => {
                    const q = getTeamQuestion(team);
                    if (!q || q.type !== 'number') return;
                    const ts = getTeamState(team);
                    if (ts.locked || (state.isAI && team === 'B')) return;
                    if (k === '清空') { ts.answer = '';
                        setFeedback(team, '');
                        updateDisplay(team); return }
                    if (k === '确定') { submitAnswer(team); return }
                    if (ts.answer.length >= 8) return;
                    ts.answer += k;
                    updateDisplay(team)
                });
                if (state.isAI && team === 'B') b.disabled = !0;
                w.appendChild(b)
            });
            return w
        }

        function createChoices(team) {
            const q = getTeamQuestion(team),
                outer = document.createElement('div');
            outer.className = 'choice-wrap';
            const c = document.createElement('div');
            c.className = 'choices';
            [...q.options].sort(() => Math.random() - .5).forEach(opt => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'choice-btn';
                b.textContent = opt;
                b.addEventListener('click', () => {
                    const ts = getTeamState(team);
                    if (ts.locked || (state.isAI && team === 'B')) return;
                    ts.selected = opt;
                    updateDisplay(team);
                    [...c.children].forEach(n => n.classList.remove('selected'));
                    b.classList.add('selected');
                    setFeedback(team, '')
                });
                if (state.isAI && team === 'B') b.disabled = !0;
                c.appendChild(b)
            });
            const a = document.createElement('div');
            a.className = 'choice-actions';
            const cl = document.createElement('button');
            cl.type = 'button';
            cl.className = 'secondary';
            cl.textContent = '重选';
            cl.addEventListener('click', () => {
                const ts = getTeamState(team);
                if (ts.locked || (state.isAI && team === 'B')) return;
                ts.selected = '';
                updateDisplay(team);
                [...c.children].forEach(n => n.classList.remove('selected'));
                setFeedback(team, '')
            });
            const ok = document.createElement('button');
            ok.type = 'button';
            ok.className = 'confirm';
            ok.textContent = '提交';
            ok.addEventListener('click', () => { if (!(state.isAI && team === 'B')) submitAnswer(team) });
            if (state.isAI && team === 'B') { cl.disabled = !0;
                ok.disabled = !0 }
            a.append(cl, ok);
            outer.append(c, a);
            return outer
        }

        function renderInput(team) {
            const inp = team === 'A' ? el.iA : el.iB,
                q = getTeamQuestion(team);
            inp.innerHTML = '';
            if (!q) return;
            if (state.isAI && team === 'B') {
                const d = document.createElement('div');
                d.style.cssText = 'text-align:center;padding:20px 0;font-weight:700;color:#8e44ad;font-size:20px';
                d.textContent = '🤖 AI 思考中...';
                inp.appendChild(d);
                return
            }
            inp.appendChild(q.type === 'number' ? createPad(team) : createChoices(team))
        }

        function stopTimer() { if (state.timerId) { clearInterval(state.timerId);
                state.timerId = null } }

        function clearNextTimer(team) { const k = team === 'A' ? 'nextTimerA' : 'nextTimerB'; if (state[k]) { clearTimeout(
                    state[k]);
                state[k] = null } }

        function clearAI() { if (state.aiTimer) { clearTimeout(state.aiTimer);
                state.aiTimer = null };
            state.aiProcessing = !1 }

        function lockAll() { state.teamA.locked = !0;
            state.teamB.locked = !0 }

        function clampScale(s) { return Math.min(2, Math.max(.5, s)) }

        function updateScale() {
            const s = clampScale(state.scale);
            state.scale = s;
            document.documentElement.style.setProperty('--ui-scale', s.toFixed(2));
            el.zoomReset.textContent = Math.round(s * 100) + '%'
        }

        function changeScale(d) { state.scale = clampScale(state.scale + d);
            updateScale() }
        async function toggleFullscreen() {
            const e = document.documentElement,
                fs = document.fullscreenElement || document.webkitFullscreenElement;
            if (fs) { if (document.exitFullscreen) await document.exitFullscreen(); return }
            if (!e.requestFullscreen) return;
            await e.requestFullscreen();
            try { if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape') } catch (
            e) {}
        }

        function updateFS() { el.fullscreen.textContent = (document.fullscreenElement || document.webkitFullscreenElement) ?
                '退出全屏' : '全屏' }

        function toggleLandscape() {
            el.app.classList.toggle('force-landscape');
            el.landscape.textContent = el.app.classList.contains('force-landscape') ? '退出横屏' : '横屏模式';
            try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}) } catch (
                e) {}
        }

        function buildTimeoutMsg() {
            if (state.scoreA > state.scoreB) return { text: '⏰ 时间到！\n' + state.teamNameA + '（家长）获胜！', icon: '🥇' };
            if (state.scoreB > state.scoreA) return { text: '⏰ 时间到！\n' + state.teamNameB + '（孩子）获胜！', icon: '🥇' };
            return { text: '⏰ 时间到！\n双方平局！', icon: '🤝' }
        }

        function createConfetti() {
            const colors = ['#ff2a00', '#0b73eb', '#f3bc86', '#ffd7aa', '#4fb8ff', '#ff9173', '#ffe59b'];
            for (let i = 0; i < 150; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animation = 'fall ' + (Math.random() * 3 + 2) + 's linear forwards';
                c.style.animationDelay = Math.random() * 2 + 's';
                el.winOverlay.appendChild(c);
                setTimeout(() => c.remove(), 5e3)
            }
        }

        async function endMatch(msg) {
            if (state.ended) return;
            state.ended = !0;
            state.timerSec = Math.max(state.timerSec, 0);
            stopTimer();
            clearNextTimer('A');
            clearNextTimer('B');
            clearAI();
            document.querySelector('.arena-stage').classList.remove('is-playing');
            lockAll();
            playSound('end');
            el.winnerIcon.textContent = msg.icon || '🏆';
            el.winText.textContent = msg.text || msg;
            el.winOverlay.classList.add('show');
            createConfetti();
            updateTop();
            renderProgress();
            updateModeStatus();
            if (state.loggedIn && !state.submitted) {
                try { await submitScore(state.userClass, state.userName, state.scoreB);
                    state.submitted = !0 } catch (e) { console.error(e) }
                await renderRank()
            }
        }

        function startTimer() {
            stopTimer();
            if (state.timerSec <= 0) state.timerSec = state.duration;
            updateTop();
            state.timerId = setInterval(() => {
                state.timerSec--;
                if (state.timerSec <= 0) { state.timerSec = 0;
                    endMatch(buildTimeoutMsg()); return }
                updateTop()
            }, 1e3)
        }

        function norm(v) { return String(v || '').trim() }

        function randomQuestion(team, type) {
            if (!state.bank.length) return null;
            const used = team === 'A' ? state.usedA : state.usedB;
            let avail = state.bank.filter(q => !used.includes(q.id));
            if (type) avail = avail.filter(q => q.type === type);
            if (!avail.length) return null;
            const idx = Math.floor(Math.random() * avail.length),
                q = avail[idx];
            used.push(q.id);
            return structuredClone(q)
        }

        // ======= AI =======
        function aiAnswer() {
            if (state.ended || !state.isAI || state.aiProcessing) return;
            const q = getTeamQuestion('B');
            if (!q) return;
            const ts = getTeamState('B');
            if (ts.locked) return;
            state.aiProcessing = !0;
            const cfg = getDiffConfig(),
                delay = cfg.delayMin + Math.random() * (cfg.delayMax - cfg.delayMin),
                willCorrect = Math.random() < cfg.accuracy;
            let sub = '';
            if (q.type === 'number') sub = willCorrect ? q.answer : genWrong(q.answer);
            else sub = willCorrect ? q.answer : (q.options.filter(o => o !== q.answer)[Math.floor(Math.random() * q.options
                    .filter(o => o !== q.answer).length)] || q.answer);
            setFeedback('B', '🤖 AI 思考中...', 'ai-thinking');
            state.aiTimer = setTimeout(() => {
                state.aiTimer = null;
                state.aiProcessing = !1;
                if (state.ended) return;
                const q2 = getTeamQuestion('B');
                if (!q2) return;
                const ts2 = getTeamState('B');
                if (ts2.locked) return;
                if (q2.type === 'number') ts2.answer = sub;
                else ts2.selected = sub;
                updateDisplay('B');
                submitAnswer('B')
            }, delay)
        }

        function genWrong(correct) {
            const n = Number(correct);
            if (isNaN(n)) return String(Number(correct) + 1);
            const offs = [-1, 1, -2, 2, -5, 5, -10, 10, -3, 3].sort(() => Math.random() - .5);
            for (let o of offs) { const v = n + o; if (v >= 0 && v <= 100 && v !== n) return String(v) }
            return String(n + 1)
        }

        // ======= 加载题目 & 提交 =======
        function loadQuestion(team) {
            if (state.ended) return;
            if (roundType === null) {
                const types = ['number', 'choice'],
                    used = team === 'A' ? state.usedA : state.usedB;
                let found = !1;
                for (let t of types) { if (state.bank.filter(q => q.type === t && !used.includes(q.id)).length) { roundType =
                            t;
                        found = !0; break } }
                if (!found) {
                    setTeamQuestion(team, null);
                    const qe = team === 'A' ? el.qA : el.qB;
                    qe.textContent = '🎯 题目已做完';
                    updateMeta(team, null);
                    setFeedback(team, '等待比赛结束...', 'ok');
                    updateDisplay(team);
                    renderInput(team);
                    if (!getTeamQuestion('A') && !getTeamQuestion('B')) endMatch(buildTimeoutMsg());
                    return
                }
            }
            let q = randomQuestion(team, roundType);
            if (!q) {
                const types = ['number', 'choice'],
                    other = types.find(t => t !== roundType);
                if (other) {
                    const used = team === 'A' ? state.usedA : state.usedB;
                    if (state.bank.filter(q2 => q2.type === other && !used.includes(q2.id)).length) { roundType = other;
                        q = randomQuestion(team, roundType) }
                }
                if (!q) {
                    setTeamQuestion(team, null);
                    const qe = team === 'A' ? el.qA : el.qB;
                    qe.textContent = '🎯 题目已做完';
                    updateMeta(team, null);
                    setFeedback(team, '等待比赛结束...', 'ok');
                    updateDisplay(team);
                    renderInput(team);
                    if (!getTeamQuestion('A') && !getTeamQuestion('B')) endMatch(buildTimeoutMsg());
                    return
                }
            }
            const qe = team === 'A' ? el.qA : el.qB,
                ts = getTeamState(team);
            setTeamQuestion(team, q);
            ts.answer = '';
            ts.selected = '';
            ts.locked = !1;
            qe.textContent = q.question;
            updateMeta(team, q);
            setFeedback(team, '');
            updateDisplay(team);
            renderInput(team);
            updateTop();
            if (state.isAI && team === 'B' && !state.ended) { clearAI();
                aiAnswer() }
        }

        function submitAnswer(team) {
            if (state.ended) return;
            const q = getTeamQuestion(team);
            if (!q) return;
            const ts = getTeamState(team);
            if (ts.locked) return;
            const sub = norm(q.type === 'number' ? ts.answer : ts.selected);
            if (!sub) { setFeedback(team, '请先输入或选择答案', 'bad'); if (!(state.isAI && team === 'B')) playSound('wrong'); return }
            const ans = norm(q.answer),
                correct = sub === ans;
            if (correct) {
                ts.locked = !0;
                if (team === 'A') { state.scoreA++;
                    state.pull++ } else { state.scoreB++;
                    state.pull-- }
                const who = team === 'A' ? state.teamNameA + '(家长)' : state.teamNameB + '(孩子)';
                setFeedback(team, '✅ 回答正确！' + who + ' 拉动 1 格', 'ok');
                if (!(state.isAI && team === 'B')) playSound('correct')
            } else {
                ts.answer = '';
                ts.selected = '';
                setFeedback(team, '❌ 回答错误，请再试一次', 'bad');
                if (!(state.isAI && team === 'B')) playSound('wrong');
                if (state.isAI && team === 'B') { clearAI();
                    setTimeout(() => { if (!state.ended && !state.teamB.locked) aiAnswer() }, 800) }
                updateDisplay(team);
                renderInput(team);
                return
            }
            updateTop();
            renderProgress();
            updateDisplay(team);
            renderInput(team);
            if (state.pull > MAX_PULL) state.pull = MAX_PULL;
            if (state.pull < -MAX_PULL) state.pull = -MAX_PULL;
            if (correct) {
                clearNextTimer(team);
                const k = team === 'A' ? 'nextTimerA' : 'nextTimerB';
                state[k] = setTimeout(() => { state[k] = null; if (!state.ended) loadQuestion(team) }, 900)
            }
        }

        // ======= 开始 & 重置 =======
        function showLogin() {
            // 自动填充：从 localStorage 读取登录信息
            const savedCls = localStorage.getItem('bahe_class');

                if (classInput) classInput.value = savedCls.replace('班', '');
                if (nameInput) nameInput.value = savedName;
            }

            el.login.classList.remove('hidden');
            el.loginName.value = '';
            el.loginErr.textContent = '';
            el.loginOk.textContent = '';
            el.loginBtn.disabled = !1;
                localStorage.setItem('bahe_class', el.classInput ? el.classInput.value : '');
                localStorage.setItem('bahe_name', el.nameInput ? el.nameInput.value : '');
            el.loginBtn.textContent = '✅ 验证并开始';

        }

        async function handleLogin() {
            const cls = el.loginClass.value,
                name = el.loginName.value.trim();
            el.loginErr.textContent = '';
            el.loginOk.textContent = '';
            if (!name) { el.loginErr.textContent = '⚠️ 请输入孩子姓名'; return }
            el.loginBtn.disabled = !0;
            el.loginBtn.textContent = '⏳ 验证中...';
            try {
                await fetchWhitelist();
                if (!checkWhitelist(cls, name)) { el.loginErr.textContent = '❌ 未找到匹配的班级和姓名，请确认后重试';
                    el.loginBtn.disabled = !1;
                    el.loginBtn.textContent = '✅ 验证并开始'; return }
                state.userClass = cls;
                state.userName = name;
                state.loggedIn = !0;
                state.submitted = !1;
                el.loginOk.textContent = '✅ 验证通过！欢迎 ' + cls + ' ' + name;
                el.loginBtn.textContent = '✅ 已验证';
                setTimeout(() => { el.login.classList.add('hidden');
                    doStart() }, 500)
            } catch (e) { el.loginErr.textContent = '⚠️ 网络连接失败，请稍后重试';
                el.loginBtn.disabled = !1;
                el.loginBtn.textContent = '✅ 验证并开始';
                console.error(e) }
        }

        function doStart() {
            if (state.ended) return alert('比赛已结束，请先点击“重置比赛”再开始。');
            if (!state.bank.length) return alert('📚 题库为空，请先到比赛设置里生成或录入题目。');
            if (!state.readyB) return alert('👶 请先让孩子（' + state.teamNameB + '）点击“准备”按钮！');
            if (state.readyA && state.readyB) {
                state.mode = 'dual';
                state.isAI = !1;
                el.readyA.className = 'ready-btn ready';
                el.readyA.textContent = '✅ 已准备';
                el.readyA.disabled = !0;
                el.readyB.className = 'ready-btn ready';
                el.readyB.textContent = '✅ 已准备';
                el.readyB.disabled = !0
            } else if (!state.readyA && state.readyB) {
                state.mode = 'single';
                state.isAI = !0;
                el.readyA.className = 'ready-btn not-ready';
                el.readyA.textContent = '⏳ 未准备 (AI)';
                el.readyA.disabled = !0;
                el.readyB.className = 'ready-btn ai-mode';
                el.readyB.textContent = '🤖 AI对手';
                el.readyB.disabled = !0;
                state.readyB = !0
            } else return alert('请至少让孩子准备！');
            el.diff.disabled = !0;
            roundType = null;
            el.start.textContent = '进行中';
            el.start.disabled = !0;
            el.winOverlay.classList.remove('show');
            el.winText.textContent = '';
            el.winOverlay.querySelectorAll('.confetti').forEach(c => c.remove());
            document.querySelector('.arena-stage').classList.add('is-playing');
            state.usedA = [];
            state.usedB = [];
            state.aiProcessing = !1;
            clearAI();
            loadQuestion('A');
            loadQuestion('B');
            if (!state.timerId) { state.timerSec = state.duration;
                startTimer() }
            renderProgress();
            updateModeStatus();
            playSound('start')
        }

        function resetGame() {
            stopTimer();
            clearNextTimer('A');
            clearNextTimer('B');
            clearAI();
            document.querySelector('.arena-stage').classList.remove('is-playing');
            roundType = null;
            el.start.textContent = '开始';
            el.start.disabled = !1;
            state.scoreA = 0;
            state.scoreB = 0;
            state.pull = 0;
            state.timerSec = state.duration;
            state.qA = null;
            state.qB = null;
            state.ended = !1;
            state.usedA = [];
            state.usedB = [];
            state.teamA = { answer: '', selected: '', locked: !1 };
            state.teamB = { answer: '', selected: '', locked: !1 };
            state.mode = 'idle';
            state.isAI = !1;
            state.aiProcessing = !1;
            clearAI();
            state.readyA = !1;
            state.readyB = !0;
            el.readyA.disabled = !1;
            el.readyB.disabled = !1;
            el.diff.disabled = !1;
            el.qA.textContent = '？？？？';
            el.qB.textContent = '？？？？';
            el.iA.innerHTML = '';
            el.iB.innerHTML = '';
            el.winOverlay.classList.remove('show');
            el.winText.textContent = '';
            el.winOverlay.querySelectorAll('.confetti').forEach(c => c.remove());
            updateMeta('A', null);
            updateMeta('B', null);
            setFeedback('A', '');
            setFeedback('B', '');
            updateDisplay('A');
            updateDisplay('B');
            renderProgress();
            updateTop();
            updateReadyUI();
            updateModeStatus()
        }

        // ======= 排行榜 =======
        function getBeijingTodayStr() {
            var d = new Date();
            d.setTime(d.getTime() + 8 * 3600 * 1000);
            return d.toISOString().slice(0, 10);
        }

        async function renderRank() {
            const c = el.rankList;
            c.innerHTML = '<div class="rank-loading">加载中...</div>';
            try {
                const subs = await fetchRank();
                if (!subs || !subs.length) { c.innerHTML = '<div class="rank-empty">暂无记录，快来挑战吧！</div>'; return }
                // 只保留当天的提交记录（北京时间）
                const todayStr = getBeijingTodayStr();
                const todaySubs = subs.filter(function(item) {
                    const dateStr = item.submitted_at || item.timestamp || item.createTime || '';
                    return String(dateStr).slice(0, 10) === todayStr;
                });
                if (!todaySubs.length) { c.innerHTML = '<div class="rank-empty">今日暂无记录，快来挑战吧！</div>'; return }
                const map = new Map();
                for (const i of todaySubs) {
                    const cls = String(i.class || '未知班级').trim(),
                        name = String(i.name || '匿名').trim(),
                        key = cls + '|' + name,
                        score = Number(i.score) || 0;
                    if (!map.has(key) || score > map.get(key).score) map.set(key, { class: cls, name, score })
                }
                const sorted = Array.from(map.values()).sort((a, b) => b.score - a.score),
                    top = sorted.slice(0, 20);
                let html = '';
                top.forEach((i, idx) => {
                    let nc = 'rank-num';
                    if (idx === 0) nc += ' gold';
                    else if (idx === 1) nc += ' silver';
                    else if (idx === 2) nc += ' bronze';
                    html +=
                        `<div class="rank-item"><span class="${nc}">${idx+1}</span><span class="rank-class">${i.class}</span><span class="rank-name">${i.name}</span><span class="rank-score">${i.score}</span></div>`
                });
                c.innerHTML = html
            } catch (e) { c.innerHTML = '<div class="rank-empty">⚠️ 加载排行榜失败，请点击刷新重试</div>';
                console.error(e) }
        }

        // ======= 批量录入 =======
        function processBatch() {
            const txt = el.batch.value.trim();
            if (!txt) return alert('请输入题目内容。');
            const lines = txt.split('\n');
            let added = 0;
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const parts = line.split('/').map(p => p.trim()).filter(Boolean);
                if (parts.length < 2) { alert('第 ' + (i + 1) + ' 行格式不正确，跳过。\n内容：' + line); continue }
                const isChoice = parts.length > 2;
                state.bank.push({ id: crypto.randomUUID(), type: isChoice ? 'choice' : 'number', question: parts[0],
                    answer: parts[1], options: isChoice ? parts.slice(1) : [] });
                added++
            }
            if (added) { saveBank();
                alert('✅ 成功批量录入 ' + added + ' 道题目！');
                el.batch.value = '' }
        }

        function renderBank() {
            updateTop();
            if (!state.bank.length) { el.bankList.innerHTML = '<div class="empty">📭 题库为空，请点击「重新生成今日题库」或手动录入。</div>'; return }
            el.bankList.innerHTML = '';
            state.bank.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bank-item';
                const l = document.createElement('div');
                const t = document.createElement('h4');
                t.textContent = item.question;
                const d = document.createElement('p');
                d.textContent = '答案: ' + item.answer + (item.type === 'choice' ? '\n选项: ' + item.options.join(' / ') :
                '');
                l.append(t, d);
                const r = document.createElement('div');
                r.className = 'item-side';
                const tag = document.createElement('div');
                tag.className = 'type-tag ' + item.type;
                tag.textContent = item.type === 'number' ? '数字题' : '选择题';
                const del = document.createElement('button');
                del.type = 'button';
                del.className = 'tiny-btn';
                del.textContent = '删除';
                del.addEventListener('click', () => { state.bank = state.bank.filter(q => q.id !== item.id);
                    saveBank() });
                r.append(tag, del);
                card.append(l, r);
                el.bankList.appendChild(card)
            })
        }

        // ======= 旋转提示 =======
        let rotateAutoHideTimer = null;
        function checkOrientation() {
            if (window.innerWidth >= 1024 && window.innerHeight < window.innerWidth) { el.rotate.classList.remove('show'); return }
            if (rotateDismissed) { el.rotate.classList.remove('show'); return }
            const isPortrait = window.innerHeight > window.innerWidth;
            el.rotate.classList.toggle('show', isPortrait);
            // 竖屏显示时，3秒后自动隐藏
            if (isPortrait && !rotateAutoHideTimer) {
                rotateAutoHideTimer = setTimeout(() => {
                    dismissRotate();
                }, 3000);
            }
            // 切到横屏时立即消失
            if (!isPortrait) {
                dismissRotate();
            }
        }

        function dismissRotate() { rotateDismissed = !0;
            el.rotate.classList.remove('show')
            if (rotateAutoHideTimer) { clearTimeout(rotateAutoHideTimer); rotateAutoHideTimer = null; }
        }

        // ======= 事件绑定 =======
        el.loginBtn.addEventListener('click', handleLogin);
        el.loginName.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin() });
        el.readyA.addEventListener('click', () => toggleReady('A'));
        el.readyB.addEventListener('click', () => toggleReady('B'));
        el.diff.addEventListener('change', function() { state.difficulty = this.value; if (state.mode === 'idle')
                updateModeStatus() });
        el.start.addEventListener('click', () => { if (state.mode !== 'idle' && !state.ended) return; if (state.loggedIn)
                doStart();
            else showLogin() });
        el.reset.addEventListener('click', resetGame);
        el.fullscreen.addEventListener('click', async () => { try { await toggleFullscreen() } catch (e) { alert(
                    '当前环境不支持全屏或被浏览器拦截。') }
            updateFS() });
        el.landscape.addEventListener('click', toggleLandscape);
        el.sound.addEventListener('click', toggleSound);
        el.zoomOut.addEventListener('click', () => changeScale(-.05));
        el.zoomIn.addEventListener('click', () => changeScale(.05));
        el.zoomReset.addEventListener('click', () => { state.scale = 1;
            updateScale() });
        el.countdown.addEventListener('change', function() {
            const v = Number(this.value),
                safe = Number.isFinite(v) ? Math.min(1800, Math.max(10, Math.round(v))) : 60;
            this.value = String(safe);
            state.duration = safe;
            if (!state.timerId) { state.timerSec = safe;
                updateTop() }
        });

        function setupTimerBtn(btn, d) {
            let iv = null,
                to = null;
            const start = e => { if (e.type === 'touchstart') e.preventDefault();
                updateTimer(d);
                to = setTimeout(() => { iv = setInterval(() => { updateTimer(d) }, 100) }, 500) };
            const stop = e => { if (e && e.type === 'touchend') e.preventDefault();
                clearTimeout(to);
                clearInterval(iv) };
            btn.addEventListener('mousedown', start);
            btn.addEventListener('touchstart', start, { passive: !1 });
            btn.addEventListener('mouseup', stop);
            btn.addEventListener('mouseleave', stop);
            btn.addEventListener('touchend', stop);
            btn.addEventListener('touchcancel', stop)
        }

        function updateTimer(d) {
            const cur = Number(el.countdown.value) || 60,
                next = cur + d;
            el.countdown.value = String(next);
            el.countdown.dispatchEvent(new Event('change'))
        }
        setupTimerBtn(el.minus, -10);
        setupTimerBtn(el.plus, 10);
        el.settingsBtn.addEventListener('click', () => el.settings.classList.add('show'));
        el.closeSettings.addEventListener('click', () => el.settings.classList.remove('show'));
        el.settings.addEventListener('click', e => { if (e.target === el.settings) el.settings.classList.remove('show') });
        el.sample.addEventListener('click', () => { if (confirm('确定重新生成今日题库（100道）吗？当前题库将被覆盖。'))
                regenerateBank() });
        el.exportBtn.addEventListener('click', exportBank);
        el.importBtn.addEventListener('click', importBank);
        el.clearBatch.addEventListener('click', () => { el.batch.value = '' });
        el.batchSave.addEventListener('click', processBatch);
        el.clearBank.addEventListener('click', () => { if (confirm('确定清空全部题库吗？')) { state.bank = [];
                saveBank() } });
        document.addEventListener('fullscreenchange', updateFS);
        el.inputNameA.addEventListener('change', function() { state.teamNameA = this.value.trim() || '蓝队';
            updateNames();
            saveBank();
            renderProgress();
            updateModeStatus() });
        el.inputNameB.addEventListener('change', function() { state.teamNameB = this.value.trim() || '红队';
            updateNames();
            saveBank();
            renderProgress();
            updateModeStatus() });
        el.refreshRank.addEventListener('click', renderRank);
        el.rotateClose.addEventListener('click', dismissRotate);
        let orientTimer = null;
        window.addEventListener('resize', () => { if (orientTimer) clearTimeout(orientTimer);
            orientTimer = setTimeout(checkOrientation, 300) });
        if (screen.orientation) screen.orientation.addEventListener('change', () => { setTimeout(checkOrientation, 400) });

        // ======= 启动 =======
        loadBank();
        el.countdown.value = String(state.duration);
        updateScale();
        updateFS();
        resetGame();
        el.sound.textContent = '🔊';
        el.app.classList.add('force-landscape');
        el.landscape.textContent = '退出横屏';
        setTimeout(checkOrientation, 500);
        setTimeout(checkOrientation, 1200);
        updateReadyUI();
        updateModeStatus();
        el.login.classList.add('hidden');
        renderRank();
        fetchWhitelist().catch(() => {});
    
        // URL参数自动登录（平台跳转时免输入）
        tryAutoLoginFromUrl().catch(() => {});
    </script>
</body>
</html>
